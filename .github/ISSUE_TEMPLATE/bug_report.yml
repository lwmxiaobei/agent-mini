name: Bug Report
description: Report a reproducible problem in xbcode
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce the issue reliably.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, commands, or prompts needed to reproduce the problem.
      placeholder: |
        1. Run `xbcode`
        2. Enter `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include your OS, Node.js version, install method, provider, and any relevant configuration details.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant terminal output, stack traces, or screenshots.
      render: shell
